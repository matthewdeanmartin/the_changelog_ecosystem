name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "content/**"
      - "data/**"
      - "themes/**"
      - "scripts/**"
      - "generate_pages.py"
      - "pelicanconf.py"
      - "publishconf.py"
      - "pyproject.toml"
      - "uv.lock"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Install Node dependencies
        run: npm ci

      - name: Generate pages from data
        run: uv run python generate_pages.py

      - name: Build production site
        run: uv run pelican content -o output -s publishconf.py

      - name: Run Python quality gates
        run: |
          uv run python scripts/check_pelican_artifacts.py --site-dir output
          uv run python scripts/check_links.py --site-dir output --internal-only

      - name: Run Node quality gates
        run: npm run quality

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
